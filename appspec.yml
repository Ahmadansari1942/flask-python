version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/flask-python
    overwrite: true
permissions:
  - object: /home/ubuntu/flask-python
    owner: ubuntu
    group: ubuntu
    mode: 755
    type:
      - directory
      - file
hooks:
  AfterInstall:
    - location: scripts/restart.sh
      timeout: 300
      runas: root
